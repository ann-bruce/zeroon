spring:
  datasource:
    url: jdbc:h2:mem:zeroon;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always

zeroon:
  evidence:
    ingestion-enabled: true
    notice-version: beta-evidence-v2
    event-hourly-limit: 10000
    retention-days: 180
  auth:
    sms-enabled: true
    access-token-secret: test-secret-with-at-least-32-characters
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 30
    local-verification-code: "000000"
    verification-code-request-cooldown-seconds: 0
    verification-code-mobile-hourly-limit: 10000
    verification-code-ip-hourly-limit: 10000
    verification-code-device-login-limit: 10000
    verification-code-ip-login-limit: 10000
