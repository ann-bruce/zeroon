spring:
  datasource:
    url: jdbc:h2:mem:zeroon;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always

zeroon:
  auth:
    access-token-secret: test-secret-with-at-least-32-characters
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 30
    local-verification-code: "000000"
