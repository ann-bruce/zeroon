spring:
  application:
    name: zeroon-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/zeroon}
    username: ${POSTGRES_USER:zeroon}
    password: ${POSTGRES_PASSWORD:change-me}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful

