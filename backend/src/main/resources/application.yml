spring:
  application:
    name: zeroon-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/zeroon}
    username: ${POSTGRES_USER:zeroon}
    password: ${POSTGRES_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change-me}
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${ZEROON_SMTP_HOST:}
    port: ${ZEROON_SMTP_PORT:587}
    username: ${ZEROON_SMTP_USERNAME:}
    password: ${ZEROON_SMTP_PASSWORD:}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": ${ZEROON_SMTP_STARTTLS_ENABLED:true}
      "[mail.smtp.ssl.enable]": ${ZEROON_SMTP_SSL_ENABLED:false}
      "[mail.smtp.connectiontimeout]": ${ZEROON_SMTP_CONNECTION_TIMEOUT_MILLIS:5000}
      "[mail.smtp.timeout]": ${ZEROON_SMTP_READ_TIMEOUT_MILLIS:10000}
      "[mail.smtp.writetimeout]": ${ZEROON_SMTP_WRITE_TIMEOUT_MILLIS:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:NONE}

zeroon:
  auth:
    sms-enabled: ${ZEROON_SMS_ENABLED:false}
    access-token-secret: ${ZEROON_ACCESS_TOKEN_SECRET:dev-only-change-this-secret-with-at-least-32-chars}
    access-token-ttl-minutes: ${ZEROON_ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${ZEROON_REFRESH_TOKEN_TTL_DAYS:30}
    local-verification-code: ${ZEROON_LOCAL_VERIFICATION_CODE:000000}
    verification-code-ttl-minutes: ${ZEROON_VERIFICATION_CODE_TTL_MINUTES:10}
    verification-code-request-cooldown-seconds: ${ZEROON_VERIFICATION_CODE_REQUEST_COOLDOWN_SECONDS:60}
    verification-code-mobile-hourly-limit: ${ZEROON_VERIFICATION_CODE_MOBILE_HOURLY_LIMIT:5}
    verification-code-ip-hourly-limit: ${ZEROON_VERIFICATION_CODE_IP_HOURLY_LIMIT:20}
    verification-code-device-login-limit: ${ZEROON_VERIFICATION_CODE_DEVICE_LOGIN_LIMIT:10}
    verification-code-ip-login-limit: ${ZEROON_VERIFICATION_CODE_IP_LOGIN_LIMIT:30}
    verification-code-login-window-minutes: ${ZEROON_VERIFICATION_CODE_LOGIN_WINDOW_MINUTES:15}
    verification-code-max-failed-attempts: ${ZEROON_VERIFICATION_CODE_MAX_FAILED_ATTEMPTS:5}
    verification-code-sender-url: ${ZEROON_VERIFICATION_CODE_SENDER_URL:}
    verification-code-sender-token: ${ZEROON_VERIFICATION_CODE_SENDER_TOKEN:}
    email-verification-code-ttl-minutes: ${ZEROON_EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
    email-verification-code-request-cooldown-seconds: ${ZEROON_EMAIL_VERIFICATION_CODE_REQUEST_COOLDOWN_SECONDS:60}
    email-verification-code-hourly-limit: ${ZEROON_EMAIL_VERIFICATION_CODE_HOURLY_LIMIT:5}
    email-verification-code-ip-hourly-limit: ${ZEROON_EMAIL_VERIFICATION_CODE_IP_HOURLY_LIMIT:20}
    email-verification-code-device-login-limit: ${ZEROON_EMAIL_VERIFICATION_CODE_DEVICE_LOGIN_LIMIT:10}
    email-verification-code-ip-login-limit: ${ZEROON_EMAIL_VERIFICATION_CODE_IP_LOGIN_LIMIT:30}
    email-verification-code-login-window-minutes: ${ZEROON_EMAIL_VERIFICATION_CODE_LOGIN_WINDOW_MINUTES:15}
    email-verification-code-max-failed-attempts: ${ZEROON_EMAIL_VERIFICATION_CODE_MAX_FAILED_ATTEMPTS:5}
    email-from: ${ZEROON_EMAIL_FROM:}
  ai:
    provider: ${ZEROON_LLM_PROVIDER:openai-compatible}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${ZEROON_LLM_MODEL:gpt-4o-mini}
    timeout-seconds: ${ZEROON_LLM_TIMEOUT_SECONDS:10}
  support:
    request-hourly-limit: ${ZEROON_SUPPORT_REQUEST_HOURLY_LIMIT:5}
    message-hourly-limit: ${ZEROON_SUPPORT_MESSAGE_HOURLY_LIMIT:20}
    closed-retention-days: ${ZEROON_SUPPORT_CLOSED_RETENTION_DAYS:180}
    retention-cron: ${ZEROON_SUPPORT_RETENTION_CRON:0 17 * * * *}
  evidence:
    ingestion-enabled: ${ZEROON_EVIDENCE_INGESTION_ENABLED:false}
    notice-version: ${ZEROON_EVIDENCE_NOTICE_VERSION:beta-evidence-v2}
    event-hourly-limit: ${ZEROON_EVIDENCE_EVENT_HOURLY_LIMIT:200}
    retention-days: ${ZEROON_EVIDENCE_RETENTION_DAYS:180}
    retention-cron: ${ZEROON_EVIDENCE_RETENTION_CRON:0 29 * * * *}
