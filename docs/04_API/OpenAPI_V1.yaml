      type: object
      required: [items, page, size, totalElements]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
    GrowthSummary:
      type: object
      required:
        [continuousResetDays, cachedEntries, companionDays, timezone, calculatedAt]
      properties:
        continuousResetDays:
          type: integer
          minimum: 0
          example: 7
        cachedEntries:
          type: integer
          format: int64
          minimum: 0
          example: 126
        firstRecordDate:
          type: string
          format: date
          nullable: true
          example: 2025-06-11
        companionDays:
          type: integer
          minimum: 1
          example: 365
        timezone:
          type: string
          example: Asia/Shanghai
        calculatedAt:
          type: string
          format: date-time
    StatePatternSummary:
      type: object
      required:
        [days, sampleSize, distribution, observation, dataSources, timezone, calculatedAt]
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 90
        sampleSize:
          type: integer
          format: int64
          minimum: 0
        dominantState:
          $ref: "#/components/schemas/State"
          nullable: true
        distribution:
          type: object
          additionalProperties:
            type: integer
            format: int64
        observation:
          type: string
          description: Non-diagnostic user-facing explanation.
        dataSources:
          type: array
          items:
            type: string
        timezone:
          type: string
          example: Asia/Shanghai
        calculatedAt:
          type: string
          format: date-time
    PromptRequest:
      type: object
      required: [code, name, content]
      properties:
        code:
          type: string
          pattern: "^[A-Z0-9_]{3,100}$"
        name:
          type: string
          maxLength: 100
        content:
          type: string
          maxLength: 20000
    EvidenceOperationsResponse:
      type: object
      required:
        [cohortStart, cohortEnd, asOfDate, minimumCohortSize, suppressed,
         interpretationNotice]
      properties:
        cohortStart:
          type: string
          format: date
        cohortEnd:
          type: string
          format: date
        asOfDate:
          type: string
          format: date
        minimumCohortSize:
          type: integer
          enum: [5]
        suppressed:
          type: boolean
          description: True when the whole cohort is below the release threshold.
        activationCoverage:
          type: string
          nullable: true
        authenticatedSubjects:
          type: integer
          nullable: true
          minimum: 5
        activation:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        dayOneRetention:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        daySevenRetention:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        dayThirtyRetention:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        weekTwoRecord:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        currentWeekContinuityReview:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        currentWeekChatOnly:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        recordFlowCompletion:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceMetricCell"
          nullable: true
        reliability:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceReliabilityView"
          nullable: true
        trustControls:
          type: object
          allOf:
            - $ref: "#/components/schemas/EvidenceTrustControlsView"
          nullable: true
        interpretationNotice:
          type: string
    EvidenceMetricCell:
      type: object
      required: [suppressed]
      properties:
        suppressed:
          type: boolean
        numerator:
          type: integer
          format: int64
          nullable: true
        denominator:
          type: integer
          format: int64
          nullable: true
        rate:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
    EvidenceCountCell:
      type: object
      required: [suppressed]
      properties:
        suppressed:
          type: boolean
        events:
          type: integer
          format: int64
          nullable: true
        subjects:
          type: integer
          format: int64
          nullable: true
          minimum: 5
    EvidenceDistribution:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/EvidenceCountCell"
    EvidenceReliabilityView:
      type: object
      required:
        [recordSaved, recordSaveFailed, recordSaveSuccess, recoveredRetry,
         reflectionOutcomes, reflectionLatencyBuckets]
      properties:
        recordSaved:
          $ref: "#/components/schemas/EvidenceCountCell"
        recordSaveFailed:
          $ref: "#/components/schemas/EvidenceCountCell"
        recordSaveSuccess:
          $ref: "#/components/schemas/EvidenceMetricCell"
        recoveredRetry:
          $ref: "#/components/schemas/EvidenceMetricCell"
        reflectionOutcomes:
          $ref: "#/components/schemas/EvidenceDistribution"
        reflectionLatencyBuckets:
          $ref: "#/components/schemas/EvidenceDistribution"
    EvidenceTrustControlsView:
      type: object
      required:
        [aiContextDisabledSubjects, memoryDeletionSubjects, dataExportDemand,
         accountDeletionDemand]
      properties:
        aiContextDisabledSubjects:
          $ref: "#/components/schemas/EvidenceMetricCell"
        memoryDeletionSubjects:
          $ref: "#/components/schemas/EvidenceMetricCell"
        dataExportDemand:
          $ref: "#/components/schemas/EvidenceMetricCell"
        accountDeletionDemand:
          $ref: "#/components/schemas/EvidenceMetricCell"
    PromptTemplateListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PromptTemplateSummary"
    PromptTemplateSummary:
      type: object
      required: [id, code, name, version, enabled, createdAt]
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        version:
          type: integer
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    PromptTemplateDetail:
      allOf:
        - $ref: "#/components/schemas/PromptTemplateSummary"
        - type: object
          required: [content]
          properties:
            content:
              type: string
    Problem:
      type: object
      required: [type, title, status, traceId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        traceId:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: string
