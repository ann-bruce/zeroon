      type: object
      minProperties: 1
      properties:
        enabled:
          type: boolean
          description: Reversible activation control for continuity and AI eligibility.
        aiContextEnabled:
          type: boolean
          description: >-
            Explicit permission for this Memory to enter AI context. Closing this
            permission excludes the entry from the next companion request.
