        modelAlias:
          type: string
          maxLength: 40
          description: Content-free reviewed provider-path alias, never a raw model id.
        contextClasses:
          type: array
          uniqueItems: true
          maxItems: 2
          description: Enabled Profile/Memory context classes used for this turn; no content.
          items:
            type: string
            enum: [PROFILE, MEMORY]
    MemoryEntry:
      type: object
      required:
        [id, type, summary, importance, enabled, aiContextEnabled, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [ZERO_RECORD, STATE, CONVERSATION, GROWTH]
        title:
          type: string
        summary:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 10
        sourceType:
          type: string
          nullable: true
        sourceId:
          type: integer
          format: int64
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        enabled:
          type: boolean
          description: >-
            Whether the entry participates in continuity features. When false,
            the entry is excluded from AI context immediately even if
            aiContextEnabled remains true.
        aiContextEnabled:
          type: boolean
          description: >-
            Per-entry AI-use permission. Defaults to false. Companion requests
            include the entry only when this is true, enabled is true, the entry
            is unexpired and owned by the caller, and assembly stays within the
            configured count and character bounds. Source class and source id
            may be sent; no personality label, diagnosis, or score is generated.
